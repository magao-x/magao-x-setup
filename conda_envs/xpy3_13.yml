channels:
  - conda-forge
dependencies:
  - python=3.13
  - astropy
  # Note: Fedora slow-walks grpc releases (presumably to preserve RHEL compatibility)
  # so we have to follow them or get weird surprises when the codegen version
  # and the header versions don't match
  - grpc-cpp<1.49.0
  # Note: omission of jupyter and use of matplotlib-base prevents dependency on qt
  - jupyterlab
  - notebook
  - ipython
  - ipywidgets
  - matplotlib-base
  - numpy
  - scipy
  - numexpr
  - Pillow
  - scikit-image
  - pip
  - nb_conda_kernels
  - pytest
  - pybind11
  - psutil
  - line_profiler
  - pyserial
  # hcipy deps available in conda
  - asdf
  - pyyaml
  - imageio
  - xxhash
  # for cacao
  - pybind11
  # for xtelemdb
  - psycopg
  - python-duckdb
  - universal_pathlib
  - zarr

  - pip:
      - hcipy
      - poppy
      - fixr>=0.2.1
      - zarrs
      - jupyterlab-speedy-unfold
      - fitsview
      - pyviewarr

channels:
  - conda-forge
dependencies:
  - python=3.13
  # Note: omission of jupyter and use of matplotlib-base prevents dependency on qt
  - jupyterlab
  - notebook
  - ipython
  - ipywidgets
  - matplotlib-base
  - numpy
  - scipy
  - numexpr
  - Pillow
  - scikit-image
  - pip
  - nb_conda_kernels
  - pytest
  - pybind11
  - psutil
  - line_profiler
  - pyserial
  # for xconf
  - toml
  # hcipy deps available in conda
  - asdf
  - pyyaml
  - imageio
  - xxhash
  # for cacao
  - pybind11
  # for xtelemdb
  - psycopg
  - python-duckdb
  - universal_pathlib
  - zarr
  # to control thread explosions
  - numthreads

  - pip:
    - astropy
    - astroplan
    - hcipy
    - poppy
    - fixr>=0.2.1
    - zarrs
    - jupyterlab-speedy-unfold
    - fitsview
    - pyviewarr
